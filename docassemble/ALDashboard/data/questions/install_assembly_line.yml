            )
          ),
          "help": (
            optional_packages[key].get("help", "")
            + (
              " Updatable now."
              if package_status_by_url.get(key, {}).get("can_update")
              else ""
            )
          ),
        }
        for key in optional_packages
      ]
    default: ${ default_optional_urls }
    none of the above: False
    all of the above: True
