code: |
  if configure_api_email:
    if email_provider != "smtp":
      for key_name in [
        "server",
        "port",
        "username",
        "password",
        "use ssl",
        "use tls",
      ]:
        if key_name in the_config.get("mail", {}):
          del the_config["mail"][key_name]
    if email_provider != "sendgrid" and "sendgrid api key" in the_config:
      del the_config["sendgrid api key"]
    if email_provider != "mailgun":
      if "mailgun api key" in the_config:
        del the_config["mailgun api key"]
      if "mailgun domain" in the_config:
        del the_config["mailgun domain"]

  if configure_api_llm:
    if the_config.get("open ai", {}).get("key"):
      the_config["openai api key"] = the_config["open ai"]["key"]
    if the_config.get("open ai", {}).get("base url"):
      the_config["openai base url"] = the_config["open ai"]["base url"]
  api_config_cleanup = True
