---
include:
  - nav.yml
---
metadata:
  title: |
    Assembly Line Installer
  required privileges:
    - admin
---
imports:
  - requests
  - html
---
features:
  bootstrap theme: al_installer_bootstrap_theme.css
  css:
    - al_installer_theme.css
---
objects:
  - installer: ALPackageInstaller
  - al_logo: DAStaticFile.using(filename="dal-favicon.png")
---
code: |
  assembly_line_config = get_config("assembly line", {})
  if isinstance(assembly_line_config.get("interview list"), dict):
    interview_list_config = assembly_line_config.get("interview list", {})
  else:
    interview_list_config = {}

  installer_logo_url = interview_list_config.get("logo url") or get_config(
    "app homepage", "https://courtformsonline.org"
  )
  installer_logo_image_url = (
    interview_list_config.get("logo image url") or al_logo.url_for()
  )
  installer_logo_image_alt = interview_list_config.get("logo image alt") or ""
---
default screen parts:
  title url: |
    ${ installer_logo_url }
  exit url: |
    ${ installer_logo_url }
  logo: |
    <span class="title-container">
      <span class="al-logo">
        <img src="${ installer_logo_image_url }" alt="${ installer_logo_image_alt }"/>
      </span>
      <span class="al-title">
        <span>AssemblyLine Installer</span>
      </span>
    </span>
  short logo: |
    <span class="title-container">
      <span class="al-logo">
        <img src="${ installer_logo_image_url }" alt="${ installer_logo_image_alt }"/>
      </span>
      <span class="al-title">
        <span>AssemblyLine Installer</span>
      </span>
    </span>
  right: |
    ${ action_button_html(interview_url(i=f"{user_info().package}:menu.yml"), label="Back to Dashboard") }
---
mandatory: True
code: |
  # Show any errors first
  if len(installer.errors) > 0:
    installer.show_errors

  backup_file
  welcome
  if not update_installed_packages_only:
    basic_server_config
    recommended_api_config
    api_config_cleanup

    if configure_api_github:
      # -- GitHub --
      # Token with repo permission scope
      feedback_form_config
      complete_github_auth
      # Other config questions
      github_owners_list
      save_repo_owners
      if len(the_config["github issues"]["allowed repository owners"]) == 1:
        set_default_owner_from_list
      else:
        github_owners_default
    set_answer_set_config
    set_custom_interview_list
    assembly_line_global_config
    menu_shortcut_config
    save_config
  selected_mandatory_packages
  al_install_done
  end_screen
---
code: |
  backup_file = da_get_config_as_file()
---
question: |
  Do you want to enable answer sets?
subquestion: |
  [Answer 
  sets](https://assemblyline.suffolklitlab.org/docs/components/AssemblyLine/answer_sets/overview) 
  allow interview users to save and reuse answers in multiple interviews.
  
  If you do not want users to be able to re-use answers, turn off this feature.
fields:
  - Enable answer sets: enable_answer_sets
    datatype: yesnoradio
    default: True
  - note: |
      **Answer set imports**
      
      If you turn on the "answer set import" feature, users can save answers to a file and import them
      on the same or a different server. This feature is helpful for developers but is still experimental
      and carries some risk on production servers.
      
      Although there are no known specific attacks, answer set imports allow your users to create
      arbitrary variables inside your interview. Depending on your interview design, this could have
      unintended consequences. Therefore, this option is disabled by default.
  - Enable answer set importing: enable_answer_set_imports
    datatype: yesnoradio
    default: False
---
question: |
  Use a custom interview list page?
subquestion: |
  You can use a [custom interview list](https://assemblyline.suffolklitlab.org/docs/components/AssemblyLine/magic_variables/#use-the-assemblyline-interview-list-replacement)
  to replace Docassemble's stock "My interviews" page.

  The replacement page has been expert-tested to improve usability. It is also
  faster than the default page and can display the progress a user has made in each
  interview session.
fields:
  - Use custom interview list page: enable_custom_interview_list
    datatype: yesnoradio
  - App homepage URL: the_config['app homepage']
    default: ${ the_config.get("app homepage", "https://courtformsonline.org") }
    required: False
    show if: enable_custom_interview_list
  - What URL should the "Start a new form" link point to?: custom_interview_list_start_page
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("new form url", the_config.get("assembly line", {}).get("new form url", "https://courtformsonline.org")) }
    help: |
      Add a link to a page that lists all of the interviews that you have available.
      If you do not have a custom landing page, you might want to just use "/list".
    show if: enable_custom_interview_list
  - New form button label: custom_interview_list_new_form_label
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("new form label", "Start a new form") }
    required: False
    show if: enable_custom_interview_list
  - Browser page title: custom_interview_list_page_title
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("page title", "") }
    required: False
    show if: enable_custom_interview_list
  - Page heading: custom_interview_list_page_question
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("page question", "") }
    required: False
    show if: enable_custom_interview_list
  - Intro text under page heading: custom_interview_list_page_subquestion
    datatype: area
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("page subquestion", "") }
    required: False
    show if: enable_custom_interview_list
  - Header logo URL (click target): custom_interview_list_logo_url
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("logo url", "") }
    required: False
    show if: enable_custom_interview_list
  - Header logo image URL: custom_interview_list_logo_image_url
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("logo image url", "") }
    required: False
    show if: enable_custom_interview_list
  - Header logo image alt text: custom_interview_list_logo_image_alt
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("logo image alt", "") }
    required: False
    show if: enable_custom_interview_list
  - Header title row 1: custom_interview_list_logo_title_row_1
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("logo title row 1", "") }
    required: False
    show if: enable_custom_interview_list
  - Header title row 2: custom_interview_list_logo_title_row_2
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("logo title row 2", "") }
    required: False
    show if: enable_custom_interview_list
  - Answer sets tab label: custom_interview_list_answer_sets_title
    default: ${ the_config.get("assembly line", {}).get("interview list", {}).get("answer sets title", "") }
    required: False
    show if: enable_custom_interview_list
  - Interviews to exclude from the custom list (one per line): custom_interview_list_exclude
    datatype: area
    default: |
      ${ "\n".join(the_config.get("assembly line", {}).get("interview list", {}).get("exclude from interview list", the_config.get("assembly line", {}).get("exclude from interview list", []))) }
    required: False
    show if: enable_custom_interview_list
  - Update session to include progress and user name automatically: enable_session_metadata_update
    datatype: yesnoradio
    help: |
      Select "yes" if you want the party names and the progress of each interview displayed
      on the custom interview list.

      This feature is recommended, but does add a small database query every 3 screen loads.
      You can turn it off later if you like.
    default: True
    show if: enable_custom_interview_list
---
code: |
  if not "assembly line" in the_config:
    the_config["assembly line"] = {}
  the_config["assembly line"]["enable answer sets"] = enable_answer_sets
  the_config["assembly line"]["enable answer set imports"] = enable_answer_set_imports
  set_answer_set_config = True
---
code: |
  if not "assembly line" in the_config:
    the_config["assembly line"] = {}
  if enable_custom_interview_list:
    if not isinstance(the_config["assembly line"].get("interview list"), dict):
      the_config["assembly line"]["interview list"] = {}
    interview_list_config = the_config["assembly line"]["interview list"]

    def set_list_option(key, value):
      if isinstance(value, str):
        cleaned = value.strip()
        if cleaned:
          interview_list_config[key] = cleaned
        elif key in interview_list_config:
          del interview_list_config[key]
      elif value is not None:
        interview_list_config[key] = value

    set_list_option("new form url", custom_interview_list_start_page)
    set_list_option("new form label", custom_interview_list_new_form_label)
    set_list_option("page title", custom_interview_list_page_title)
    set_list_option("page question", custom_interview_list_page_question)
    set_list_option("page subquestion", custom_interview_list_page_subquestion)
    set_list_option("logo url", custom_interview_list_logo_url)
    set_list_option("logo image url", custom_interview_list_logo_image_url)
    set_list_option("logo image alt", custom_interview_list_logo_image_alt)
    set_list_option("logo title row 1", custom_interview_list_logo_title_row_1)
    set_list_option("logo title row 2", custom_interview_list_logo_title_row_2)
    set_list_option("answer sets title", custom_interview_list_answer_sets_title)
    exclude_items = [
      line.strip()
      for line in custom_interview_list_exclude.splitlines()
      if line.strip()
    ]
    if exclude_items:
      interview_list_config["exclude from interview list"] = exclude_items
    elif "exclude from interview list" in interview_list_config:
      del interview_list_config["exclude from interview list"]

    the_config["assembly line"][
      "update session metadata"
    ] = enable_session_metadata_update
    the_config["session list interview"] = (
      "docassemble.AssemblyLine:data/questions/interview_list.yml"
    )
  set_custom_interview_list = True
---
id: assembly line global config
continue button field: assembly_line_global_config
question: |
  Assembly Line Global Configuration
subquestion: |
  These settings map directly to current `assembly line` global config keys.
fields:
  - OCR engine for PDF processing: assembly_line_ocr_engine
    datatype: radio
    choices:
      - Use default engine: ""
      - Use ocrmypdf (faster, requires server dependency): "ocrmypdf"
    default: ${ the_config.get("assembly line", {}).get("ocr engine", "") }
  - Show support email option on Assembly Line error screens: assembly_line_show_email_to_user_on_errors
    datatype: yesno
    default: ${ bool(the_config.get("assembly line", {}).get("show email to user on errors", False)) }
  - Allow users to download incomplete documents from error screens: assembly_line_enable_incomplete_downloads
    datatype: yesno
    default: ${ bool(the_config.get("assembly line", {}).get("enable incomplete downloads", False)) }
  - Show feedback link on Assembly Line error screens: assembly_line_enable_error_action_feedback_link
    datatype: yesno
    default: ${ bool(the_config.get("assembly line", {}).get("enable error action feedback link", False)) }
  - Extra custom error actions (markdown bullet lines, one per line): assembly_line_custom_error_actions
    datatype: area
    required: False
    default: |
      ${ "\n".join(the_config.get("assembly line", {}).get("custom error actions", [])) }
---
code: |
  if not "assembly line" in the_config:
    the_config["assembly line"] = {}
  if isinstance(assembly_line_ocr_engine, str) and assembly_line_ocr_engine.strip():
    the_config["assembly line"]["ocr engine"] = assembly_line_ocr_engine.strip()
  elif "ocr engine" in the_config["assembly line"]:
    del the_config["assembly line"]["ocr engine"]
  the_config["assembly line"][
    "show email to user on errors"
  ] = assembly_line_show_email_to_user_on_errors
  the_config["assembly line"][
    "enable incomplete downloads"
  ] = assembly_line_enable_incomplete_downloads
  the_config["assembly line"][
    "enable error action feedback link"
  ] = assembly_line_enable_error_action_feedback_link
  custom_actions = [
    line.strip()
    for line in assembly_line_custom_error_actions.splitlines()
    if line.strip()
  ]
  if custom_actions:
    the_config["assembly line"]["custom error actions"] = custom_actions
  elif "custom error actions" in the_config["assembly line"]:
    del the_config["assembly line"]["custom error actions"]
---
depends on:
  - allowed_github_repo_owners
code: |
  the_config["github issues"][
    "allowed repository owners"
  ] = allowed_github_repo_owners.splitlines()
  save_repo_owners = True
---
code: |
  github_result = installer.get_validated_github_username(
    the_config["github issues"]["token"]
  )
  if type(github_result) is str:
    the_config["github issues"]["username"] = github_result
  complete_github_auth = True
---
code: |
  the_config["github issues"]["default repository owner"] = the_config["github issues"][
    "allowed repository owners"
  ][0]
  set_default_owner_from_list = True
---
code: |
  if (
    add_weaver_shortcut
    and not "docassemble.ALWeaver:data/questions/assembly_line.yml"
    in the_config.get("administrative interviews", [])
  ):
    if not isinstance(the_config.get("administrative interviews"), list):
      the_config["administrative interviews"] = []
    the_config["administrative interviews"].append(
      "docassemble.ALWeaver:data/questions/assembly_line.yml"
    )
  if (
    add_dashboard_shortcut
    and not "docassemble.ALDashboard:data/questions/menu.yml"
    in the_config.get("administrative interviews", [])
  ):
    if not isinstance(the_config.get("administrative interviews"), list):
      the_config["administrative interviews"] = []
    the_config["administrative interviews"].append(
      "docassemble.ALDashboard:data/questions/menu.yml"
    )

  if (
    add_playground_examples
    and not "docassemble.ALRecipes:data/questions/examples.yml"
    in the_config.get("playground examples", [])
  ):
    if not isinstance(the_config.get("playground examples"), list):
      the_config["playground examples"] = []
    the_config["playground examples"].insert(
      0, "docassemble.ALRecipes:data/questions/examples.yml"
    )
    # Add the default playground examples explicitly
    if (
      not "docassemble.base:data/questions/example-list.yml"
      in the_config["playground examples"]
    ):
      the_config["playground examples"].append(
        "docassemble.base:data/questions/example-list.yml"
      )
  if (
    add_word_translations
    and not "docassemble.AssemblyLine:data/sources/es-words.yml"
    in the_config.get("words")
  ):
    if not isinstance(the_config.get("words"), list):
      the_config["words"] = []
    the_config["words"].append("docassemble.AssemblyLine:data/sources/es-words.yml")

  results = da_write_config(the_config)
  save_config = True
---
id: welcome
continue button field: welcome
question: |
  Document Assembly Line Installation
subquestion: |
  Thank you for using the [Document Assembly Line](https://suffolklitlab.org/docassemble-AssemblyLine-documentation/docs/)
  framework.
  
  This script will help you:
  
  1. Install packages; and
  2. Update your Docassemble configuration file.
  
  When you finish this script, you should be able to run and build your
  own Docassemble interviews using the Assembly Line framework. For example,
  the interviews hosted at [CourtFormsOnline.org](https://courtformsonline.org).
  
  You may want to pause and download a copy of your
  [:file-download: configuration file](${ backup_file.url_for(attachment=True) }) before you continue.
fields:
  - note: |
      ${ installed_package_status_summary }
    show if:
      code: |
        has_installed_assemblyline_packages
  - Update only currently installed Assembly Line packages (skip configuration questions): update_installed_packages_only
    datatype: yesnoradio
    default: True
    show if:
      code: |
        has_installed_assemblyline_packages
---
code: |
  the_config = da_get_config()

  # Create some empty structures in config for new settings
  if not the_config.get("efile proxy"):
