code: |
  package_catalog = {
    **mandatory_packages,
    **optional_packages,
  }
  package_status_rows = get_assemblyline_package_status(package_catalog)
  package_status_by_url = {row["url"]: row for row in package_status_rows}
  installed_package_status_rows = [
    row for row in package_status_rows if row.get("installed")
  ]
  has_installed_assemblyline_packages = len(installed_package_status_rows) > 0


  def format_status_row(row):
    version = str(row.get("version") or "unknown")
    latest_version = str(row.get("latest_version") or version)
    latest_source = str(row.get("latest_source") or "unknown")
    has_update = version != latest_version
    label = html.escape(str(row.get("label") or ""))
    package_name = html.escape(str(row.get("package_name") or ""))
    version = html.escape(version)

    # Format latest version info
    if has_update:
      latest_info = html.escape(f"{ latest_version } ({ latest_source })")
      update_state = "yes"
    else:
      latest_info = "(up to date)"
      update_state = "no"

    return (
      f"<tr><td>{ label }</td>"
      f"<td><code>{ package_name }</code></td>"
      f"<td>{ version }</td>"
      f"<td>{ latest_info }</td>"
      f"<td>{ update_state }</td></tr>"
    )


  if has_installed_assemblyline_packages:
    installed_rows = "\n".join(
      format_status_row(row) for row in installed_package_status_rows
    )
    installed_package_status_summary = (
      "### Installed Assembly Line packages detected\n\n"
      "You can skip directly to package updates if you only want to refresh installed packages.\n\n"
      "<table class='table table-sm table-striped'>"
      "<thead><tr><th>Package</th><th>Python package</th><th>Installed version</th><th>Latest available</th><th>Updatable now</th></tr></thead>"
      f"<tbody>{ installed_rows }</tbody></table>"
    )
  else:
    installed_package_status_summary = (
      "No Assembly Line packages were detected as installed."
    )
    update_installed_packages_only = False

  installed_mandatory_urls = [
    row["url"]
    for row in package_status_rows
    if row.get("installed") and not row.get("optional")
  ]
  installed_optional_urls = [
    row["url"]
    for row in package_status_rows
    if row.get("installed") and row.get("optional")
  ]
  default_mandatory_urls = (
    installed_mandatory_urls
    if installed_mandatory_urls
    else [
      "https://github.com/SuffolkLITLab/docassemble-ALToolbox",
      "https://github.com/SuffolkLITLab/docassemble-AssemblyLine",
      "https://github.com/SuffolkLITLab/docassemble-GithubFeedbackForm",
    ]
  )
  default_optional_urls = installed_optional_urls
---
code: |
  selected_package_urls = (
    selected_mandatory_packages.true_values() + selected_optional_packages.true_values()
  )
  for pkg_url in selected_package_urls:
    pkgname = install_from_github_url(pkg_url)
  if len(selected_package_urls):
    reset(pkgname)
  al_install_done = True
---
