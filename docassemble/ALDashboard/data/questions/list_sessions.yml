---
metadata:
  temporary session: True
  sessions are unique: True
---
default screen parts:
  right: |
    % if user_has_privilege(['admin', 'developer']):
    ${ action_button_html(interview_url(i=f"{user_info().package}:menu.yml"), label="Back to Dashboard") }
    % endif
---
features:
  css:
    - docassemble.ALDashboard:data/static/heatmap.css
---
modules:
  - .aldashboard
---
#mandatory: True # Use while developing in playground
continue button field: playground_splash
id: splash screen
question: |
  Splash screen
---
code: |
  if user_has_privilege(["admin", "developer"]):
    interviews = {interview["filename"]: interview for interview in interview_menu()}
  else:
    allowed_interviews = set()
    for privilege in user_privileges():
      allowed_interviews.update(
        get_config("assembly line", {})
        .get("interview viewers", {})
        .get(privilege, [])
      )
    interviews = {
      interview["filename"]: interview
      for interview in interview_menu()
      if interview["filename"] in allowed_interviews
    }
---
code: |
  # Compute current interview usage and apply heatmap styles
  if user_has_privilege(["admin", "developer"]):
    current_interview_usage = dashboard_session_activity()
    current_usage_rows = make_usage_rows(
      current_interview_usage, nicer_interview_filename, limit=10
    )
    current_usage_rows = compute_heatmap_styles(current_usage_rows)
  else:
    current_usage_rows = []
---
id: select interview
question: |
  What interview do you want to view sessions for?
subquestion: |
  % if user_has_privilege(['admin', 'developer']):
  Pick an interview from the list below, or type a filename like: `docassemble.playground1:data/questions/interview.yml`
  % else:
  You can only view sessions for interviews you have access to.
  % endif
under: |
  % if user_has_privilege(['admin', 'developer']):
  % if current_usage_rows:
  <h2 class="h4">Current Interview Usage</h2>
  <table class="table table-sm table-striped">
    <thead>
      <tr>
        <th>Interview</th>
        <th class="text-center">1m</th>
        <th class="text-center">5m</th>
        <th class="text-center">10m</th>
        <th class="text-center">30m</th>
        <th class="text-center">60m</th>
        <th class="text-center">120m</th>
        <th class="text-center">Users</th>
      </tr>
    </thead>
        <tbody>
        % for r in current_usage_rows:
          <tr>
            <td><a href="${ url_action("set_interview_to_browse", filename=r['filename']) }">${ r['title'] }</a></td>
            <td class="text-center heat-cell" style="${ r.get('style_attr_1','') }">${ r['s_1'] }</td>
            <td class="text-center heat-cell" style="${ r.get('style_attr_5','') }">${ r['s_5'] }</td>
            <td class="text-center heat-cell" style="${ r.get('style_attr_10','') }">${ r['s_10'] }</td>
            <td class="text-center heat-cell" style="${ r.get('style_attr_30','') }">${ r['s_30'] }</td>
            <td class="text-center heat-cell" style="${ r.get('style_attr_60','') }">${ r['s_60'] }</td>
            <td class="text-center heat-cell" style="${ r.get('style_attr_120','') }">${ r['s_120'] }</td>
            <td class="text-center heat-cell" style="${ r.get('style_attr_users','') }">${ r['users'] }</td>
          </tr>
        % endfor
        </tbody>
  </table>
  % else:
  <div class="alert alert-secondary">Nobody is using the server right now (no sessions started in last 120 minutes).</div>
  % endif
  % endif
fields:
  - Mode: session_list_mode
    datatype: radio
    choices:
      - Browse recent sessions: browse
      - Search answer values: search
    default: browse
  - Filename: filename
    required: False
    datatype: combobox
    code: |
      sorted(
        list(interviews.keys()),
        key=lambda fname: (
          interviews.get(fname).get("title")
          if isinstance(interviews.get(fname), dict)
          else (
            getattr(interviews.get(fname), "title", None)
            or (
              interviews.get(fname)
              if isinstance(interviews.get(fname), str)
              else fname
            )
          )
        ),
      )
  - User (leave blank to view all sessions): chosen_user
    required: False
    datatype: integer
    input type: combobox
    code: |
      (
        speedy_get_users()
        if user_has_privilege(["admin", "developer"])
        else [{user_info().id: user_info().email}]
      )
  - Filter out interviews that are on the first page: filter_step1
    required: False
    datatype: yesno
    default: True
  - Use advanced answer-variable filters: session_search_use_advanced_filters
    datatype: yesno
    default: False
    show if:
      variable: session_list_mode
      is: search
  - Variable name: session_search_variable_name
    js show if: |
      val("session_list_mode") == "search" && !val("session_search_use_advanced_filters")
  - Value contains: session_search_variable_value
    js show if: |
      val("session_list_mode") == "search" && !val("session_search_use_advanced_filters")
  - note: |
      **Answer-variable filter syntax:** enter one filter per line as
      `variable = partial text`. Do not quote the partial text. Quote dictionary
      keys inside a variable path, for example:

      `legalserver_data["case_number"] = 12345`

      `clients[0].name.last = Smith`
    js show if: |
      val("session_list_mode") == "search" && val("session_search_use_advanced_filters")
  - Advanced filters: session_search_criteria_text
    datatype: area
    rows: 6
    required: False
    js show if: |
      val("session_list_mode") == "search" && val("session_search_use_advanced_filters")
  - Modified on or after: session_search_start_date
    datatype: date
    required: False
    show if:
      variable: session_list_mode
      is: search
  - Modified on or before: session_search_end_date
    datatype: date
    required: False
    show if:
      variable: session_list_mode
      is: search
validation code: |
  if session_list_mode == "search":
    if session_search_use_advanced_filters:
      session_search_resolved_criteria_text = build_session_search_criteria_text(
        "",
        "",
        use_advanced_filters=True,
        advanced_criteria_text=session_search_criteria_text,
      )
    else:
      session_search_resolved_criteria_text = build_session_search_criteria_text(
        session_search_variable_name,
        session_search_variable_value,
      )
    try:
      parse_session_search_criteria(session_search_resolved_criteria_text)
    except SessionSearchCriteriaError as error:
      validation_error(
        str(error),
        field="session_search_criteria_text" if session_search_use_advanced_filters else "session_search_variable_name",
      )
  else:
    session_search_resolved_criteria_text = ""
    session_search_start_date = None
    session_search_end_date = None
---
# next((item.get('title') for item in interviews if item.get('filename') == interview['filename']), interview['filename'] )
---
code: |
  # For debugging purposes
  sessions_list = speedy_get_sessions(
    user_id=chosen_user,
    filename=filename,
    filter_step1=filter_step1,
    start_date=session_search_start_date if session_list_mode == "search" else None,
    end_date=session_search_end_date if session_list_mode == "search" else None,
    search_criteria_text=session_search_resolved_criteria_text,
  )
---
code: |
  # users_and_names() returns a tuple of user ID to email, name, last
  # Convert to a dict with key of user id, formatted email, name, last

  users_and_name_dict = {
    user_id: f"{email} {name} {last}"
    for user_id, email, name, last in get_users_and_name()
  }
---
event: set_interview_to_browse
code: |
  filename = action_argument("filename")
  chosen_user = None
  filter_step1 = True
  session_list_mode = "browse"
  session_search_resolved_criteria_text = ""
  session_search_start_date = None
  session_search_end_date = None
  undefine("sessions_list")
---
mandatory: True
event: load_answer
id: session list
question: |
  % if filename:
  ${ "Matching" if session_list_mode == "search" else "Recently started" } sessions for ${ nicer_interview_filename(interviews.get(filename, {"title": filename}).get('title', filename)) }
  % elif chosen_user:
  ${ "Matching" if session_list_mode == "search" else "Recently started" } sessions for User ID ${ chosen_user}
  % else:
  ${ "Matching" if session_list_mode == "search" else "Recently started" } sessions for all users
  % endif
subquestion: |

  <table class="table">
    <thead>
      <tr>
        <th>Title and session ID</th>
        <th>User</th>
        <th>Modified</th>
        <th>Step / Progress</th>
        <th>Actions</th>
      </tr>
    </thead>

  % for interview in sessions_list:
  <tr>
    <td class="text-wrap text-break">
      <strong>${ interview.title if interview.title else interview.auto_title }</strong>
      <br/>
      ${ interview.key }
  % if not filename:
      <br/>
      ${ nicer_interview_filename(interview.filename) }
  % endif
    </td>
    <td>${ format_session_users(interview, users_and_name_dict) }</td>
    <td>${ format_date(interview.modtime, "MMM d YYYY") }</td>
    <td>
      ${ f"Step {interview.num_keys if not interview.progress else (lambda x: f'{float(x):.2f}' if isinstance(x, (int, float, str)) and str(x).replace('.', '', 1).isdigit() else None)(interview.progress)}%"}
    </td>
    <td>
      <a href="${ interview_url(i=interview.filename, session=interview.key) }">
        <i class="fa-solid fa-folder-open"></i>&nbsp;Join</a>
    <br/>
    <a href="${ interview_url_action('view_session_variables', session_id=interview.key, filename=interview.filename) }"><i class="fa-solid fa-eye"></i>&nbsp;Vars</a>
  % if user_has_privilege('admin'):
    <br/>
    <a href="${ url_action('delete_session', session_id=interview.key, filename=interview.filename) }"><i class="fa-solid fa-trash"></i>&nbsp;Delete</a>
  % endif
    </td>
  </tr>
  % endfor
  </table>
back button: True
---
event: view_session_variables
code: |
  response(
    binaryresponse=json.dumps(
      dashboard_get_session_variables(
        session_id=action_argument("session_id"),
        filename=action_argument("filename"),
      )
    ).encode("utf-8"),
    content_type="application/json",
    response_code=200,
  )
---
event: delete_session
code: |
  if interview_list(
    action="delete",
    filename=action_argument("filename"),
    session=action_argument("session_id"),
    user_id="all",
    delete_shared=True,
  ):
    log("Deleted session", "success")
  else:
    log("Something went wrong deleting session", "danger")
