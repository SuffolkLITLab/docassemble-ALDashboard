---
metadata:
  title: Search interview sessions
  short title: Session search
  description: Search saved interview sessions by values in their answer dictionaries.
  temporary session: True
  sessions are unique: True
---
include:
  - docassemble.AssemblyLine:assembly_line.yml
---
modules:
  - .session_search
---
mandatory: True
code: |
  if not user_logged_in() or not user_has_privilege(["admin", "developer"]):
    session_search_access_denied
  session_search_form
  session_search_task
  if session_search_task.ready():
    if session_search_task.failed():
      session_search_failed
    session_search_result = session_search_task.get()
    session_search_results
  else:
    session_search_waiting
---
id: session search form
question: Search interview sessions
subquestion: |
  Enter one filter per line using `variable = partial text`. Filters are
  case-insensitive and all filters must match. Variable paths may contain
  attributes, quoted dictionary keys, and integer list indexes.

  Example: `legalserver_data["client"]["last_name"] = Smith`
fields:
  - Interview filename: session_search_filename
    default: docassemble.WorkflowDocs:data/questions/slsct_bankruptcy_main.yml
    hint: docassemble.Package:data/questions/interview.yml
  - Filters: session_search_criteria_text
    datatype: area
    rows: 6
    hint: |
      legalserver_data["case_number"] = 12345
      clients[0].name.last = Smith
  - Database filters (optional): session_search_sql_filters_text
    datatype: area
    rows: 4
    required: False
    hint: |
      created >= 2026-01-01
      modified <= 2026-06-30
      steps >= 2
    help: |
      These filters run in SQL before session answers are loaded. Supported fields
      are `created`, `modified`, `steps`, and `user_id`. Supported operators are
      `=`, `!=`, `<`, `<=`, `>`, and `>=`. Dates use `YYYY-MM-DD`.
  - Maximum matching sessions to display: session_search_max_results
    datatype: integer
    default: 100
    min: 1
    max: 1000
validation code: |
  if ":" not in session_search_filename or not session_search_filename.endswith((".yml", ".yaml")):
    validation_error("Enter a full docassemble interview filename.", field="session_search_filename")
  try:
    parse_session_search_criteria(session_search_criteria_text)
    parse_session_sql_filters(session_search_sql_filters_text)
  except SessionSearchCriteriaError as error:
    validation_error(str(error), field="session_search_criteria_text")
  undefine("session_search_task")
continue button field: session_search_form
---
code: |
  session_search_task = background_action(
    "run_session_search",
    filename=session_search_filename.strip(),
    criteria_text=session_search_criteria_text,
    sql_filters_text=session_search_sql_filters_text,
    max_results=session_search_max_results,
  )
---
event: run_session_search
code: |
  result = search_interview_sessions(
    action_argument("filename"),
    action_argument("criteria_text"),
    sql_filters_text=action_argument("sql_filters_text"),
    max_results=action_argument("max_results"),
  )
  background_response(result)
---
event: session_search_waiting
question: Searching interview sessions
subquestion: |
  The search is running in the background. This page will update automatically.
reload: True
---
event: session_search_results
question: Session search results
subquestion: |
  Searched **${ session_search_result["sessions_examined"] }** sessions and found
  **${ session_search_result["matching_sessions"] }** matches.

  % if session_search_result["load_errors"]:
  ${ session_search_result["load_errors"] } sessions could not be loaded. This can
  happen when answers are encrypted with a key unavailable to the current user.
  % endif

  % if session_search_result["truncated"]:
  Showing the first ${ session_search_result["max_results"] } matches, newest first.
  % endif

  % if session_search_result["results"]:
  <div class="table-responsive">
  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Session</th>
        <th>User</th>
        <th>Modified</th>
        <th>Matching values</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
    % for result in session_search_result["results"]:
      <tr>
        <td class="text-break">
          % if result["title"]:
          <strong>${ result["title"] }</strong><br>
          % endif
          <code>${ result["session_id"] }</code>
        </td>
        <td>${ result["user_id"] if result["user_id"] is not None else "Anonymous" }</td>
        <td>${ result["modified"] }</td>
        <td>
          % for path, matched_value in result["values"].items():
          <div><code>${ path }</code>: ${ matched_value }</div>
          % endfor
        </td>
        <td>
          <a class="btn btn-sm btn-primary" href="${ interview_url(i=result['filename'], session=result['session_id']) }">Open</a>
        </td>
      </tr>
    % endfor
    </tbody>
  </table>
  </div>
  % else:
  No matching sessions were found.
  % endif
back button: True
---
event: session_search_failed
question: The session search failed
subquestion: |
  The background task could not complete. Check the worker log for the detailed error.
back button: True
---
event: session_search_access_denied
question: Access denied
subquestion: |
  You must be signed in as an administrator or developer to search interview sessions.
---
