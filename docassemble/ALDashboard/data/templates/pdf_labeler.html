<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssemblyLine PDF Labeler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        .field-box { position: absolute; border: 2px solid #0ea5e9; background: rgba(14, 165, 233, 0.1); cursor: move; }
        .field-box:hover { background: rgba(14, 165, 233, 0.2); }
        .field-box.selected { border-color: #2563eb; background: rgba(37, 99, 235, 0.2); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3); }
        .field-box.signature { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }
        .field-box.checkbox { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .resize-handle { position: absolute; width: 10px; height: 10px; background: #2563eb; border: 1px solid white; }
        .resize-handle.nw { top: -5px; left: -5px; cursor: nw-resize; }
        .resize-handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
        .resize-handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }
        .resize-handle.se { bottom: -5px; right: -5px; cursor: se-resize; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .pdf-page { position: relative; margin-bottom: 16px; background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .field-label { position: absolute; top: 2px; left: 4px; font-size: 10px; background: rgba(0,0,0,0.7); color: white; padding: 1px 4px; border-radius: 2px; max-width: calc(100% - 8px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tool-btn.active { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 px-6 py-4">
            <div class="max-w-full mx-auto flex items-center justify-between gap-4 flex-wrap">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">AssemblyLine PDF Labeler</h1>
                    <p class="text-slate-500 text-sm mt-1">Add and edit PDF form fields using AI detection</p>
                </div>
                
                <!-- Tool Buttons -->
                <div id="tools-container" class="flex items-center gap-2 flex-wrap">
                    <label class="inline-flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg cursor-pointer hover:bg-blue-100 transition text-sm font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Upload PDF
                        <input type="file" id="file-input" accept=".pdf" class="hidden">
                    </label>
                    
                    <div class="h-6 w-px bg-slate-300 mx-2"></div>
                    
                    <button id="tool-text" class="tool-btn px-3 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition text-sm font-medium" title="Text Field">
                        <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
                        Text
                    </button>
                    <button id="tool-multiline" class="tool-btn px-3 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition text-sm font-medium" title="Multi-line Text">
                        <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 10h18M3 14h18M3 18h10"/></svg>
                        Multiline
                    </button>
                    <button id="tool-checkbox" class="tool-btn px-3 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition text-sm font-medium" title="Checkbox">
                        <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="m9 12 2 2 4-4"/></svg>
                        Checkbox
                    </button>
                    <button id="tool-signature" class="tool-btn px-3 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition text-sm font-medium" title="Signature">
                        <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m14.5 3.5 6 6-11 11H3v-6.5l11-11Z"/></svg>
                        Signature
                    </button>
                    
                    <div class="h-6 w-px bg-slate-300 mx-2"></div>
                    
                    <button id="auto-detect-btn" class="px-3 py-2 bg-emerald-100 text-emerald-700 rounded-lg hover:bg-emerald-200 transition text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        Auto-Detect
                    </button>
                    <button id="relabel-btn" class="px-3 py-2 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 transition text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        AI Relabel
                    </button>

                    <div class="relative flex items-center gap-2">
                        <label for="ai-model" class="text-xs font-semibold uppercase tracking-wide text-slate-500 whitespace-nowrap">AI model</label>
                        <input id="ai-model" type="text" class="w-44 px-2 py-1 border border-slate-300 rounded-md text-xs font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Type model name">
                        <div id="ai-model-suggestions" class="absolute top-7 left-16 z-10 hidden max-h-40 w-72 overflow-y-auto rounded-md border border-slate-200 bg-white p-1 shadow-lg"></div>
                    </div>
                    
                    <div class="h-6 w-px bg-slate-300 mx-2"></div>
                    
                    <button id="export-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-semibold disabled:bg-slate-300 disabled:cursor-not-allowed" disabled>
                        Export PDF
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 flex overflow-hidden">
            <!-- PDF Preview -->
            <div id="pdf-container" class="flex-1 overflow-auto bg-slate-200 p-6">
                <div id="pdf-empty" class="h-full flex items-center justify-center text-center">
                    <div>
                        <svg class="w-24 h-24 mx-auto text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                        </svg>
                        <h3 class="mt-4 text-lg font-medium text-slate-400">Upload a PDF to get started</h3>
                        <p class="mt-2 text-slate-400">Drag and drop or click "Upload PDF" above</p>
                    </div>
                </div>
                <div id="pdf-loading" class="hidden h-full flex items-center justify-center">
                    <div class="text-center">
                        <svg class="loading-spinner w-12 h-12 mx-auto text-blue-600" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <p id="loading-message" class="mt-4 text-slate-600">Loading PDF...</p>
                    </div>
                </div>
                <div id="pdf-pages" class="hidden max-w-4xl mx-auto"></div>
            </div>

            <!-- Fields Panel -->
            <aside id="fields-panel" class="w-80 bg-white border-l border-slate-200 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-slate-200">
                    <h2 class="font-semibold text-slate-800">Fields</h2>
                    <p id="field-count" class="text-sm text-slate-500 mt-1">No fields</p>
                </div>
                
                <div id="fields-empty" class="flex-1 flex items-center justify-center p-6 text-center">
                    <div>
                        <p class="text-slate-500 text-sm">Use the tools above to draw fields on the PDF, or use Auto-Detect.</p>
                    </div>
                </div>
                
                <div id="fields-list" class="hidden flex-1 overflow-y-auto p-4 space-y-3"></div>
                
                <!-- Selected Field Editor -->
                <div id="field-editor" class="hidden border-t border-slate-200 bg-slate-50 p-4 space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Field Name</label>
                        <input type="text" id="field-name-input" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Field Type</label>
                        <select id="field-type-select" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="text">Single-line Text</option>
                            <option value="multiline">Multi-line Text</option>
                            <option value="checkbox">Checkbox</option>
                            <option value="signature">Signature</option>
                            <option value="dropdown">Dropdown</option>
                            <option value="listbox">List Box</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Page</label>
                        <span id="field-page-display" class="text-sm text-slate-700">1</span>
                    </div>
                    <button id="delete-field-btn" class="w-full px-3 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition text-sm font-medium">
                        Delete Field
                    </button>
                </div>
            </aside>
        </main>

        <!-- Error Toast -->
        <div id="error-toast" class="hidden fixed bottom-4 right-4 bg-red-600 text-white px-4 py-3 rounded-lg shadow-lg max-w-md">
            <p id="error-toast-message"></p>
        </div>
        
        <!-- Success Toast -->
        <div id="success-toast" class="hidden fixed bottom-4 right-4 bg-green-600 text-white px-4 py-3 rounded-lg shadow-lg max-w-md">
            <p id="success-toast-message"></p>
        </div>
    </div>

    <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';

    // Set worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

    // State
    const state = {
        pdfFile: null,
        pdfBytes: null,
        pdfDoc: null,
        pageCount: 0,
        pageSizes: [],
        fields: [],
        selectedFieldId: null,
        selectedTool: null,
        isDrawing: false,
        drawStart: null,
        renderScale: 1.5,
        defaultModel: 'gpt-5-mini',
        recommendedModels: ['gpt-5-mini'],
        availableModels: [],
        model: 'gpt-5-mini'
    };

    // DOM Elements
    const fileInput = document.getElementById('file-input');
    const pdfEmpty = document.getElementById('pdf-empty');
    const pdfLoading = document.getElementById('pdf-loading');
    const loadingMessage = document.getElementById('loading-message');
    const pdfPages = document.getElementById('pdf-pages');
    const fieldsEmpty = document.getElementById('fields-empty');
    const fieldsList = document.getElementById('fields-list');
    const fieldEditor = document.getElementById('field-editor');
    const fieldNameInput = document.getElementById('field-name-input');
    const fieldTypeSelect = document.getElementById('field-type-select');
    const fieldPageDisplay = document.getElementById('field-page-display');
    const deleteFieldBtn = document.getElementById('delete-field-btn');
    const fieldCount = document.getElementById('field-count');
    const autoDetectBtn = document.getElementById('auto-detect-btn');
    const relabelBtn = document.getElementById('relabel-btn');
    const exportBtn = document.getElementById('export-btn');
    const errorToast = document.getElementById('error-toast');
    const errorToastMessage = document.getElementById('error-toast-message');
    const successToast = document.getElementById('success-toast');
    const successToastMessage = document.getElementById('success-toast-message');
    const aiModelInput = document.getElementById('ai-model');
    const aiModelSuggestions = document.getElementById('ai-model-suggestions');

    // AssemblyLine naming conventions
    const AL_FIELD_NAMES = {
        text: ['users[0].name.first', 'users[0].name.last', 'users[0].name.full()', 'users[0].address.address', 
               'users[0].address.city', 'users[0].address.state', 'users[0].address.zip', 'users[0].phone_number',
               'users[0].email', 'other_parties[0].name.full()', 'docket_number', 'case_name'],
        signature: ['users[0].signature', 'other_parties[0].signature', 'attorney.signature'],
        checkbox: ['user_agrees', 'is_plaintiff', 'is_defendant', 'has_children']
    };

    // Tool buttons
    const toolButtons = {
        text: document.getElementById('tool-text'),
        multiline: document.getElementById('tool-multiline'),
        checkbox: document.getElementById('tool-checkbox'),
        signature: document.getElementById('tool-signature')
    };

    // Helper functions
    function generateId() {
        return 'field-' + Math.random().toString(36).substr(2, 9);
    }

    async function fetchModelCatalog() {
        try {
            const response = await fetch('/al/labeler/api/models', { method: 'GET' });
            const data = await response.json();
            if (!data.success || !data.data) return;
            state.defaultModel = data.data.default_model || state.defaultModel;
            state.recommendedModels = Array.isArray(data.data.recommended_models) && data.data.recommended_models.length
                ? data.data.recommended_models
                : [state.defaultModel];
            state.availableModels = Array.isArray(data.data.available_models) ? data.data.available_models : [];
            state.model = state.defaultModel;
            aiModelInput.value = state.model;
        } catch (_error) {
            aiModelInput.value = state.model;
        }
    }

    function renderModelSuggestions(filterText) {
        const filter = (filterText || '').trim().toLowerCase();
        const source = filter
            ? (state.availableModels.length ? state.availableModels : state.recommendedModels)
            : state.recommendedModels;
        const models = source.filter((name) => !filter || name.toLowerCase().includes(filter)).slice(0, 20);
        aiModelSuggestions.innerHTML = '';
        if (models.length === 0) {
            aiModelSuggestions.classList.add('hidden');
            return;
        }
        models.forEach((name) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'block w-full rounded px-2 py-1 text-left font-mono text-xs hover:bg-slate-100';
            button.textContent = name;
            button.addEventListener('click', () => {
                aiModelInput.value = name;
                state.model = name;
                aiModelSuggestions.classList.add('hidden');
            });
            aiModelSuggestions.appendChild(button);
        });
        aiModelSuggestions.classList.remove('hidden');
    }

    function showLoading(message) {
        loadingMessage.textContent = message;
        pdfEmpty.classList.add('hidden');
        pdfLoading.classList.remove('hidden');
        pdfPages.classList.add('hidden');
    }

    function hideLoading() {
        pdfLoading.classList.add('hidden');
    }

    function showError(message) {
        errorToastMessage.textContent = message;
        errorToast.classList.remove('hidden');
        setTimeout(() => errorToast.classList.add('hidden'), 5000);
    }

    function showSuccess(message) {
        successToastMessage.textContent = message;
        successToast.classList.remove('hidden');
        setTimeout(() => successToast.classList.add('hidden'), 3000);
    }

    function updateFieldCount() {
        const count = state.fields.length;
        fieldCount.textContent = count === 0 ? 'No fields' : `${count} field${count === 1 ? '' : 's'}`;
    }

    function defaultFieldName(type) {
        const typeFields = state.fields.filter(f => f.type === type);
        const typeName = type.charAt(0).toUpperCase() + type.slice(1);
        return `${typeName}_${typeFields.length + 1}`;
    }

    // Load PDF
    async function loadPdf(file) {
        state.pdfFile = file;
        showLoading('Loading PDF...');

        try {
            const arrayBuffer = await file.arrayBuffer();
            state.pdfBytes = new Uint8Array(arrayBuffer);
            state.pdfDoc = await pdfjsLib.getDocument({ data: state.pdfBytes }).promise;
            state.pageCount = state.pdfDoc.numPages;
            state.pageSizes = [];

            // Get page sizes
            for (let i = 1; i <= state.pageCount; i++) {
                const page = await state.pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1 });
                state.pageSizes.push({ width: viewport.width, height: viewport.height });
            }

            // Render pages
            await renderPages();

            // Detect existing fields
            showLoading('Detecting existing fields...');
            await detectExistingFields();

            hideLoading();
            pdfPages.classList.remove('hidden');
            
            // Enable buttons
            autoDetectBtn.disabled = false;
            relabelBtn.disabled = state.fields.length === 0;
            exportBtn.disabled = false;

            updateFieldCount();
            renderFieldsList();

        } catch (error) {
            console.error('Error loading PDF:', error);
            showError('Failed to load PDF: ' + error.message);
            pdfEmpty.classList.remove('hidden');
            hideLoading();
        }
    }

    async function renderPages() {
        pdfPages.innerHTML = '';

        for (let pageNum = 1; pageNum <= state.pageCount; pageNum++) {
            const page = await state.pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: state.renderScale });

            // Create page container
            const pageDiv = document.createElement('div');
            pageDiv.className = 'pdf-page';
            pageDiv.dataset.pageIndex = pageNum - 1;
            pageDiv.style.width = viewport.width + 'px';
            pageDiv.style.height = viewport.height + 'px';

            // Create canvas
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const context = canvas.getContext('2d');

            await page.render({
                canvasContext: context,
                viewport: viewport
            }).promise;

            pageDiv.appendChild(canvas);

            // Create field overlay
            const overlay = document.createElement('div');
            overlay.className = 'absolute inset-0';
            overlay.dataset.pageIndex = pageNum - 1;
            pageDiv.appendChild(overlay);

            pdfPages.appendChild(pageDiv);

            // Add event listeners for drawing
            setupPageEventListeners(overlay, pageNum - 1);
        }

        // Render existing fields
        renderFieldsOnPages();
    }

    function setupPageEventListeners(overlay, pageIndex) {
        overlay.addEventListener('mousedown', (e) => {
            if (!state.selectedTool) return;
            if (e.target !== overlay) return;

            const rect = overlay.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;

            state.isDrawing = true;
            state.drawStart = { pageIndex, x, y };

            // Deselect current field
            selectField(null);
        });

        overlay.addEventListener('mousemove', (e) => {
            if (!state.isDrawing || !state.drawStart) return;
            
            const rect = overlay.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;

            // Update draft rectangle visual
            updateDraftRect(pageIndex, state.drawStart.x, state.drawStart.y, x, y);
        });

        overlay.addEventListener('mouseup', (e) => {
            if (!state.isDrawing || !state.drawStart) return;

            const rect = overlay.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;

            // Create field if drag was significant
            const width = Math.abs(x - state.drawStart.x);
            const height = Math.abs(y - state.drawStart.y);

            if (width > 0.01 && height > 0.01) {
                const newField = {
                    id: generateId(),
                    name: defaultFieldName(state.selectedTool),
                    type: state.selectedTool,
                    pageIndex: pageIndex,
                    x: Math.min(state.drawStart.x, x),
                    y: Math.min(state.drawStart.y, y),
                    width: width,
                    height: height,
                    fontSize: 12
                };

                state.fields.push(newField);
                renderFieldsOnPages();
                renderFieldsList();
                selectField(newField.id);
                updateFieldCount();
            }

            // Clean up
            state.isDrawing = false;
            state.drawStart = null;
            removeDraftRect();
            
            // Clear tool selection
            setSelectedTool(null);
        });

        // Click to deselect
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                selectField(null);
            }
        });
    }

    let draftRectEl = null;
    function updateDraftRect(pageIndex, x1, y1, x2, y2) {
        const pageDiv = document.querySelector(`.pdf-page[data-page-index="${pageIndex}"]`);
        if (!pageDiv) return;

        if (!draftRectEl) {
            draftRectEl = document.createElement('div');
            draftRectEl.className = 'absolute border-2 border-dashed border-amber-500 bg-amber-100/30 pointer-events-none';
            pageDiv.appendChild(draftRectEl);
        }

        const left = Math.min(x1, x2) * 100;
        const top = Math.min(y1, y2) * 100;
        const width = Math.abs(x2 - x1) * 100;
        const height = Math.abs(y2 - y1) * 100;

        draftRectEl.style.left = left + '%';
        draftRectEl.style.top = top + '%';
        draftRectEl.style.width = width + '%';
        draftRectEl.style.height = height + '%';
    }

    function removeDraftRect() {
        if (draftRectEl) {
            draftRectEl.remove();
            draftRectEl = null;
        }
    }

    function renderFieldsOnPages() {
        // Remove existing field elements
        document.querySelectorAll('.field-box').forEach(el => el.remove());

        state.fields.forEach(field => {
            const pageDiv = document.querySelector(`.pdf-page[data-page-index="${field.pageIndex}"]`);
            if (!pageDiv) return;

            const fieldEl = document.createElement('div');
            fieldEl.className = `field-box ${field.type} ${state.selectedFieldId === field.id ? 'selected' : ''}`;
            fieldEl.dataset.fieldId = field.id;
            fieldEl.style.left = (field.x * 100) + '%';
            fieldEl.style.top = (field.y * 100) + '%';
            fieldEl.style.width = (field.width * 100) + '%';
            fieldEl.style.height = (field.height * 100) + '%';

            // Add label
            const label = document.createElement('span');
            label.className = 'field-label';
            label.textContent = field.name;
            fieldEl.appendChild(label);

            // Add resize handles if selected
            if (state.selectedFieldId === field.id) {
                ['nw', 'ne', 'sw', 'se'].forEach(pos => {
                    const handle = document.createElement('div');
                    handle.className = `resize-handle ${pos}`;
                    handle.dataset.handle = pos;
                    fieldEl.appendChild(handle);
                });
            }

            // Click to select
            fieldEl.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                selectField(field.id);

                // Start drag if not clicking resize handle
                if (!e.target.classList.contains('resize-handle')) {
                    startDragField(field, e);
                } else {
                    startResizeField(field, e.target.dataset.handle, e);
                }
            });

            pageDiv.appendChild(fieldEl);
        });
    }

    let dragState = null;
    function startDragField(field, e) {
        const fieldEl = document.querySelector(`[data-field-id="${field.id}"]`);
        const pageDiv = fieldEl.closest('.pdf-page');
        const rect = pageDiv.getBoundingClientRect();

        const startX = (e.clientX - rect.left) / rect.width;
        const startY = (e.clientY - rect.top) / rect.height;

        dragState = {
            field,
            startX,
            startY,
            origX: field.x,
            origY: field.y
        };

        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);
    }

    function onDragMove(e) {
        if (!dragState) return;

        const fieldEl = document.querySelector(`[data-field-id="${dragState.field.id}"]`);
        const pageDiv = fieldEl.closest('.pdf-page');
        const rect = pageDiv.getBoundingClientRect();

        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;

        const dx = x - dragState.startX;
        const dy = y - dragState.startY;

        dragState.field.x = Math.max(0, Math.min(1 - dragState.field.width, dragState.origX + dx));
        dragState.field.y = Math.max(0, Math.min(1 - dragState.field.height, dragState.origY + dy));

        renderFieldsOnPages();
    }

    function onDragEnd() {
        dragState = null;
        document.removeEventListener('mousemove', onDragMove);
        document.removeEventListener('mouseup', onDragEnd);
    }

    let resizeState = null;
    function startResizeField(field, handle, e) {
        e.stopPropagation();

        resizeState = {
            field,
            handle,
            origX: field.x,
            origY: field.y,
            origWidth: field.width,
            origHeight: field.height,
            startEvent: e
        };

        document.addEventListener('mousemove', onResizeMove);
        document.addEventListener('mouseup', onResizeEnd);
    }

    function onResizeMove(e) {
        if (!resizeState) return;

        const fieldEl = document.querySelector(`[data-field-id="${resizeState.field.id}"]`);
        const pageDiv = fieldEl.closest('.pdf-page');
        const rect = pageDiv.getBoundingClientRect();

        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;
        const startX = (resizeState.startEvent.clientX - rect.left) / rect.width;
        const startY = (resizeState.startEvent.clientY - rect.top) / rect.height;

        const dx = x - startX;
        const dy = y - startY;

        const handle = resizeState.handle;
        const minSize = 0.02;

        if (handle.includes('e')) {
            resizeState.field.width = Math.max(minSize, resizeState.origWidth + dx);
        }
        if (handle.includes('w')) {
            const newWidth = Math.max(minSize, resizeState.origWidth - dx);
            resizeState.field.x = resizeState.origX + resizeState.origWidth - newWidth;
            resizeState.field.width = newWidth;
        }
        if (handle.includes('s')) {
            resizeState.field.height = Math.max(minSize, resizeState.origHeight + dy);
        }
        if (handle.includes('n')) {
            const newHeight = Math.max(minSize, resizeState.origHeight - dy);
            resizeState.field.y = resizeState.origY + resizeState.origHeight - newHeight;
            resizeState.field.height = newHeight;
        }

        // Clamp to page bounds
        resizeState.field.x = Math.max(0, Math.min(1 - resizeState.field.width, resizeState.field.x));
        resizeState.field.y = Math.max(0, Math.min(1 - resizeState.field.height, resizeState.field.y));

        renderFieldsOnPages();
    }

    function onResizeEnd() {
        resizeState = null;
        document.removeEventListener('mousemove', onResizeMove);
        document.removeEventListener('mouseup', onResizeEnd);
    }

    function selectField(fieldId) {
        state.selectedFieldId = fieldId;
        renderFieldsOnPages();

        if (fieldId) {
            const field = state.fields.find(f => f.id === fieldId);
            if (field) {
                fieldEditor.classList.remove('hidden');
                fieldNameInput.value = field.name;
                fieldTypeSelect.value = field.type;
                fieldPageDisplay.textContent = (field.pageIndex + 1).toString();
            }
        } else {
            fieldEditor.classList.add('hidden');
        }

        renderFieldsList();
    }

    function renderFieldsList() {
        if (state.fields.length === 0) {
            fieldsEmpty.classList.remove('hidden');
            fieldsList.classList.add('hidden');
            return;
        }

        fieldsEmpty.classList.add('hidden');
        fieldsList.classList.remove('hidden');
        fieldsList.innerHTML = '';

        state.fields.forEach(field => {
            const item = document.createElement('div');
            item.className = `p-3 rounded-lg border cursor-pointer transition ${
                state.selectedFieldId === field.id 
                    ? 'border-blue-500 bg-blue-50' 
                    : 'border-slate-200 hover:border-slate-300'
            }`;
            item.innerHTML = `
                <div class="flex items-center justify-between">
                    <span class="font-medium text-sm text-slate-800 truncate">${escapeHtml(field.name)}</span>
                    <span class="text-xs text-slate-500 ml-2">Page ${field.pageIndex + 1}</span>
                </div>
                <div class="text-xs text-slate-500 mt-1 capitalize">${field.type}</div>
            `;
            item.addEventListener('click', () => {
                selectField(field.id);
                // Scroll to field
                const fieldEl = document.querySelector(`[data-field-id="${field.id}"]`);
                if (fieldEl) {
                    fieldEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
            fieldsList.appendChild(item);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function setSelectedTool(tool) {
        state.selectedTool = tool;
        Object.entries(toolButtons).forEach(([key, btn]) => {
            if (key === tool) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // Detect existing fields
    async function detectExistingFields() {
        if (!state.pdfFile) return;

        try {
            const formData = new FormData();
            formData.append('file', state.pdfFile);

            const response = await fetch('/al/pdf-labeler/api/detect-fields', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success && data.data.fields) {
                // Convert to normalized coordinates
                data.data.fields.forEach(field => {
                    const pageSize = state.pageSizes[field.pageIndex];
                    if (pageSize) {
                        state.fields.push({
                            id: generateId(),
                            name: field.name,
                            type: field.type,
                            pageIndex: field.pageIndex,
                            x: field.x / pageSize.width,
                            y: 1 - (field.y + field.height) / pageSize.height,
                            width: field.width / pageSize.width,
                            height: field.height / pageSize.height,
                            fontSize: field.fontSize || 12
                        });
                    }
                });

                renderFieldsOnPages();
                renderFieldsList();
                updateFieldCount();
                relabelBtn.disabled = state.fields.length === 0;
            }
        } catch (error) {
            console.error('Error detecting fields:', error);
        }
    }

    // Auto-detect fields with AI
    async function autoDetectFields() {
        if (!state.pdfFile) return;

        showLoading('Auto-detecting fields with AI...');

        try {
            const formData = new FormData();
            formData.append('file', state.pdfFile);
            formData.append('normalize_fields', 'true');
            formData.append('model', state.model || state.defaultModel);

            const response = await fetch('/al/pdf-labeler/api/auto-detect', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (!data.success) {
                throw new Error(data.error?.message || 'Auto-detection failed');
            }

            // Update PDF bytes if new fields were added
            if (data.data.pdf_base64) {
                const binaryString = atob(data.data.pdf_base64);
                state.pdfBytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    state.pdfBytes[i] = binaryString.charCodeAt(i);
                }
            }

            // Clear existing fields and add new ones
            state.fields = [];
            if (data.data.fields) {
                data.data.fields.forEach(field => {
                    const pageSize = state.pageSizes[field.pageIndex];
                    if (pageSize) {
                        state.fields.push({
                            id: generateId(),
                            name: field.name,
                            type: field.type,
                            pageIndex: field.pageIndex,
                            x: field.x / pageSize.width,
                            y: 1 - (field.y + field.height) / pageSize.height,
                            width: field.width / pageSize.width,
                            height: field.height / pageSize.height,
                            fontSize: field.fontSize || 12
                        });
                    }
                });
            }

            hideLoading();
            pdfPages.classList.remove('hidden');

            renderFieldsOnPages();
            renderFieldsList();
            updateFieldCount();
            relabelBtn.disabled = state.fields.length === 0;

            showSuccess(`Detected ${state.fields.length} fields`);

        } catch (error) {
            console.error('Error auto-detecting:', error);
            hideLoading();
            pdfPages.classList.remove('hidden');
            showError('Auto-detection failed: ' + error.message);
        }
    }

    // AI Relabel
    async function relabelFields() {
        if (!state.pdfFile || state.fields.length === 0) return;

        showLoading('Relabeling fields with AI...');

        try {
            const formData = new FormData();
            formData.append('file', state.pdfFile);
            formData.append('model', state.model || state.defaultModel);

            const response = await fetch('/al/pdf-labeler/api/relabel', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (!data.success) {
                throw new Error(data.error?.message || 'Relabeling failed');
            }

            // Update PDF bytes
            if (data.data.pdf_base64) {
                const binaryString = atob(data.data.pdf_base64);
                state.pdfBytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    state.pdfBytes[i] = binaryString.charCodeAt(i);
                }

                // Reload to get new field names
                state.pdfFile = new File([state.pdfBytes], state.pdfFile.name, { type: 'application/pdf' });
                state.fields = [];
                await detectExistingFields();
            }

            hideLoading();
            pdfPages.classList.remove('hidden');
            renderFieldsOnPages();
            renderFieldsList();

            showSuccess('Fields relabeled successfully');

        } catch (error) {
            console.error('Error relabeling:', error);
            hideLoading();
            pdfPages.classList.remove('hidden');
            showError('Relabeling failed: ' + error.message);
        }
    }

    // Export PDF
    async function exportPdf() {
        if (!state.pdfBytes || state.fields.length === 0) {
            showError('No fields to export');
            return;
        }

        showLoading('Exporting PDF...');

        try {
            // Convert fields back to absolute coordinates
            const fieldsData = state.fields.map(field => {
                const pageSize = state.pageSizes[field.pageIndex];
                return {
                    name: field.name,
                    type: field.type,
                    pageIndex: field.pageIndex,
                    x: field.x * pageSize.width,
                    y: (1 - field.y - field.height) * pageSize.height,
                    width: field.width * pageSize.width,
                    height: field.height * pageSize.height,
                    fontSize: field.fontSize
                };
            });

            const formData = new FormData();
            formData.append('file', state.pdfFile);
            formData.append('fields', JSON.stringify(fieldsData));

            const response = await fetch('/al/pdf-labeler/api/apply-fields', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (!data.success) {
                throw new Error(data.error?.message || 'Export failed');
            }

            // Download the file
            const binaryString = atob(data.data.pdf_base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = data.data.filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            hideLoading();
            pdfPages.classList.remove('hidden');
            showSuccess('PDF exported successfully');

        } catch (error) {
            console.error('Error exporting:', error);
            hideLoading();
            pdfPages.classList.remove('hidden');
            showError('Export failed: ' + error.message);
        }
    }

    // Event Listeners
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) loadPdf(file);
    });

    aiModelInput.addEventListener('input', () => {
        state.model = aiModelInput.value.trim() || state.defaultModel;
        renderModelSuggestions(aiModelInput.value);
    });
    aiModelInput.addEventListener('focus', () => {
        renderModelSuggestions(aiModelInput.value);
    });
    document.addEventListener('mousedown', (e) => {
        if (!aiModelSuggestions.contains(e.target) && e.target !== aiModelInput) {
            aiModelSuggestions.classList.add('hidden');
        }
    });

    Object.entries(toolButtons).forEach(([tool, btn]) => {
        btn.addEventListener('click', () => {
            setSelectedTool(state.selectedTool === tool ? null : tool);
        });
    });

    autoDetectBtn.addEventListener('click', autoDetectFields);
    relabelBtn.addEventListener('click', relabelFields);
    exportBtn.addEventListener('click', exportPdf);

    // Field editor
    fieldNameInput.addEventListener('change', () => {
        if (state.selectedFieldId) {
            const field = state.fields.find(f => f.id === state.selectedFieldId);
            if (field) {
                field.name = fieldNameInput.value;
                renderFieldsOnPages();
                renderFieldsList();
            }
        }
    });

    fieldTypeSelect.addEventListener('change', () => {
        if (state.selectedFieldId) {
            const field = state.fields.find(f => f.id === state.selectedFieldId);
            if (field) {
                field.type = fieldTypeSelect.value;
                renderFieldsOnPages();
                renderFieldsList();
            }
        }
    });

    deleteFieldBtn.addEventListener('click', () => {
        if (state.selectedFieldId) {
            state.fields = state.fields.filter(f => f.id !== state.selectedFieldId);
            selectField(null);
            renderFieldsOnPages();
            renderFieldsList();
            updateFieldCount();
            relabelBtn.disabled = state.fields.length === 0;
        }
    });

    // Drag and drop
    const pdfContainer = document.getElementById('pdf-container');
    pdfContainer.addEventListener('dragover', (e) => {
        e.preventDefault();
        pdfContainer.classList.add('bg-blue-100');
    });
    pdfContainer.addEventListener('dragleave', () => {
        pdfContainer.classList.remove('bg-blue-100');
    });
    pdfContainer.addEventListener('drop', (e) => {
        e.preventDefault();
        pdfContainer.classList.remove('bg-blue-100');
        const file = e.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') {
            loadPdf(file);
        }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Delete' || e.key === 'Backspace') {
            if (state.selectedFieldId && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                deleteFieldBtn.click();
            }
        }
        if (e.key === 'Escape') {
            setSelectedTool(null);
            selectField(null);
            aiModelSuggestions.classList.add('hidden');
        }
    });

    fetchModelCatalog();

    </script>
</body>
</html>
