[[tool.mypy.overrides]]
module="docx"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module="docx.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module="mako.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module="formfyxer"
